name: Push to main

on:
  push:
    branches:
      - test-release-tags
    tags:
      - '**'
env:
  QUAY_ORG: quay.io/rh_ee_camadorg
  QUAY_CHARTS: quay.io/rh_ee_camadorg
  QUAY_STANDALONE_REPO: flightctl-ui
  QUAY_OCP_REPO: flightctl-ocp-ui

jobs:

  extract-versions:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.extract-versions.outputs.tags }}
      helmversion: ${{ steps.extract-versions.outputs.helmversion }}    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract versions
        id: extract-versions
        run: |
          if ${{ github.ref_type == 'tag' }}; then
            tags=( ${{ github.ref_name }} )
            echo "tags=${tags[@]}" >> $GITHUB_OUTPUT
            echo "tags=${tags[@]}"

            # Obtain the version for the helm charts
            helmversion=$(git describe --tags)
            echo "helmversion=${helmversion}" >> $GITHUB_OUTPUT
            echo "helmversion=${helmversion}"            
          else
            # Obtain the tag for the base repositories
            tags=( latest-${GITHUB_SHA} latest )
            echo "tags=${tags[@]}" >> $GITHUB_OUTPUT
            echo "tags=${tags[@]}"

            # Obtain the version for the helm charts
            helmversion=$(git describe --long --tags)
            echo "helmversion=${helmversion}" >> $GITHUB_OUTPUT
            echo "helmversion=${helmversion}"
          fi

  publish-flightctl-ui:
    if: github.repository == 'skip-this-job'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate tags
        id: generate-tags
        run: |
          if ${{ github.ref_type == 'tag' }}; then
            tags=( ${{ github.ref_name }} )
            echo "tags=${tags[@]}" >> $GITHUB_OUTPUT
            echo "tags=${tags[@]}"
          else
            tags=( latest-${GITHUB_SHA} latest )
            echo "tags=${tags[@]}" >> $GITHUB_OUTPUT
            echo "tags=${tags[@]}"
          fi

      - name: Build
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.QUAY_STANDALONE_REPO }}
          tags: ${{ steps.generate-tags.outputs.tags }}
          labels: |
            org.flightctl.flightctl-ui.github.repository=${{ github.repository }}
            org.flightctl.flightctl-ui.github.actor=${{ github.actor }}
            org.flightctl.flightctl-ui.github.run_id=${{ github.run_id }}
            org.flightctl.flightctl-ui.github.sha=${{ github.sha }}
            org.flightctl.flightctl-ui.github.ref_name=${{ github.ref_name }}
          extra-args: |
            --ulimit nofile=10000:10000
          containerfiles: Containerfile
          context: .

      - name: Push to Quay.io
        id: push
        uses: redhat-actions/push-to-registry@v2.7
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.QUAY_ORG }}
          username: ${{ secrets.QUAY_CAMADOR_INFRA_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_CAMADOR_INFRA_ROBOT_PASSWORD }}

  publish-flightctl-ocp-ui:
    if: github.repository == 'skip-this-job'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate tags
        id: generate-tags
        run: |
          if ${{ github.ref_type == 'tag' }}; then
            tags=( ${{ github.ref_name }} )
            echo "tags=${tags[@]}" >> $GITHUB_OUTPUT
            echo "tags=${tags[@]}"
          else
            tags=( latest-${GITHUB_SHA} latest )
            echo "tags=${tags[@]}" >> $GITHUB_OUTPUT
            echo "tags=${tags[@]}"
          fi

      - name: Build
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.QUAY_OCP_REPO }}
          tags: ${{ steps.generate-tags.outputs.tags }}
          labels: |
            org.flightctl.flightctl-ui.github.repository=${{ github.repository }}
            org.flightctl.flightctl-ui.github.actor=${{ github.actor }}
            org.flightctl.flightctl-ui.github.run_id=${{ github.run_id }}
            org.flightctl.flightctl-ui.github.sha=${{ github.sha }}
            org.flightctl.flightctl-ui.github.ref_name=${{ github.ref_name }}
          extra-args: |
            --ulimit nofile=10000:10000
          containerfiles: Containerfile.ocp
          context: .

      - name: Push to Quay.io
        id: push
        uses: redhat-actions/push-to-registry@v2.7
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.QUAY_ORG }}
          username: ${{ secrets.QUAY_CAMADOR_INFRA_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_CAMADOR_INFRA_ROBOT_PASSWORD }}

  publish-helm-charts:
    runs-on: ubuntu-latest
    needs: [extract-versions]
    steps:

      - run: echo '${{ toJSON(needs.extract-versions.outputs) }}'

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        run: |        
          if ${{ github.ref_type == 'tag' }}; then
            VERSION=$(git describe --tags)
            VERSION=${VERSION#v} # remove the leading v prefix for version
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
            echo "VERSION=${VERSION}"
          else
            VERSION=$(git describe --long --tags)
            VERSION=${VERSION#v} # remove the leading v prefix for version
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
            echo "VERSION=${VERSION}"
          fi      
          echo "PREV JOB=${jobs.generate-tags.outputs.tags}"    